# BizClaw Portal — Production Deployment
# Domain: portal.openfang.com.vn (auto-SSL via Caddy)
# Run: docker compose up --build -d

version: "3.8"
services:
  portal-db:
    image: postgres:16-alpine
    volumes:
      - portal-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${PORTAL_DB_USER:-portal}
      - POSTGRES_PASSWORD=${PORTAL_DB_PASSWORD:-portal}
      - POSTGRES_DB=${PORTAL_DB_NAME:-portal}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U portal -d portal" ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  portal:
    build: .
    volumes:
      - portal-data:/data
    environment:
      - PORTAL_LISTEN=0.0.0.0:4201
      - PORTAL_DATABASE_URL=postgres://portal:portal@portal-db:5432/portal
      - OPENFANG_API_URL=${OPENFANG_API_URL:-https://openfangcom.vn}
      - PORTAL_ADMIN_KEY=${PORTAL_ADMIN_KEY:-}
      - OPENFANG_API_KEY=${OPENFANG_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      portal-db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - portal
    restart: unless-stopped

volumes:
  portal-pgdata:
  portal-data:
  caddy-data:
  caddy-config:

    # Connect to OpenFang on the same network:
    # Option 1: Use external network
    #   docker network create bizclaw
    #   Then uncomment below:
    # networks:
    #   default:
    #     external: true
    #     name: bizclaw
    #
    # Option 2: Use host networking for OPENFANG_API_URL
    #   OPENFANG_API_URL=http://host.docker.internal:4200
