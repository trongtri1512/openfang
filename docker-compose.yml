# NOTE: The GHCR image (ghcr.io/rightnow-ai/openfang) is not yet public.
# For now, build from source using `docker compose up --build`
# Data is persisted in Docker named volume 'openfang-data'

version: "3.8"
services:
  openfang:
    build: .
    ports:
      - "4200:4200"
    volumes:
      - openfang-data:/data
    environment:
      - OPENFANG_LISTEN=0.0.0.0:4200
      - OPENFANG_API_KEY=${OPENFANG_API_KEY:-openfang}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    restart: unless-stopped

volumes:
  openfang-data:
